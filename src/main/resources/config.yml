# 语言设置 (zh / en) | Language setting (zh / en)
language: zh

# 数据库配置 | Database configuration
database:
  # 支持类型: mysql, postgresql, sqlite | Supported types: mysql, postgresql, sqlite
  type: sqlite
  mysql:
    host: localhost
    port: 3306
    db: your_db
    user: your_user
    pass: your_pass
  postgresql:
    host: localhost
    port: 5432
    db: your_db
    user: your_user
    pass: your_pass
  sqlite:
    file: catcraft.db

permissions:
  set-title: "catcraft.title.set"
  admin: "catcraft.admin"

settings:
  debug: true
  enable-rgb: false
  check-update: true

# 商店系统配置
shop:
  # 是否启用商店（关闭后同时禁用金币系统）
  enabled: true
  # 玩家初始金币（当首次查询时）
  default-balance: 0
  # 每日签到奖励金币
  signin-reward: 30

